        - uid: ffm74dp2bg1s0e
          title: Ratio critique par station
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: afm4rznroj11ce
              model:
                dataset: postgres
                editorMode: code
                format: table
                intervalMs: 1000
                maxDataPoints: 43200
                rawQuery: true
                rawSql: "SELECT\r\n  station_name,\r\n  round(\r\n    count(*) FILTER (WHERE is_critical = true)::numeric\r\n    / nullif(count(*), 0) * 100\r\n  , 2) AS critical_ratio_pct\r\nFROM public.pareto_losses_kpi\r\nWHERE production_day >= (\r\n        SELECT max(production_day) - interval '6 months'\r\n        FROM public.pareto_losses_kpi\r\n      )\r\nGROUP BY station_name\r\nORDER BY critical_ratio_pct DESC;"
                refId: A
                sql:
                    columns:
                        - parameters: []
                          type: function
                    groupBy:
                        - property:
                            type: string
                          type: groupBy
                    limit: 50
            - refId: B
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - B
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                reducer: last
                refId: B
                type: reduce
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 32
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: B
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 30s
          annotations:
            summary: "\U0001F6A8 Ratio de pertes critiques élevé sur {{ $labels.station_name }}\n\nRatio critique actuel : {{ $values.B }}%\nSeuil déclencheur : 32%\n\n→ Analyser sur le dashboard Production Losses / Pareto"
          isPaused: false
          notification_settings:
            receiver: grafana-default-email
        - uid: afm7n0ryac6wwf
          title: Goulot critique
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 7776000
                to: 0
              datasourceUid: afm4rznroj11ce
              model:
                dataset: postgres
                editorMode: code
                format: table
                intervalMs: 1000
                maxDataPoints: 43200
                rawQuery: true
                rawSql: "SELECT\r\n    workstep_desc AS bottleneck_step,\r\n    COUNT(*) AS workorders_count\r\nFROM public.production_routing_overview w\r\nWHERE w.is_current = true\r\n  AND $__timeFilter(w.startdate)\r\nGROUP BY workstep_desc\r\nHAVING COUNT(*) > 5;"
                refId: A
                sql:
                    columns:
                        - parameters: []
                          type: function
                    groupBy:
                        - property:
                            type: string
                          type: groupBy
                    limit: 50
            - refId: B
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - B
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                reducer: last
                refId: B
                type: reduce
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 100
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: B
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 30s
          annotations:
            summary: "\U0001F6A8 Goulot critique détecté : {{ $labels.bottleneck_step }}\n\nNombre de workorders concernés : {{ $values.B }}\nSeuil critique : 100\n\n→ Analyser sur le dashboard Production Routing Overview"
          isPaused: false
          notification_settings:
            receiver: grafana-default-email
