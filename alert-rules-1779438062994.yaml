apiVersion: 1
groups:
    - orgId: 1
      name: Quality alerts
      folder: Production KPIs
      interval: 30s
      rules:
        - uid: bfm4wum8i4dmof
          title: Scrap Rate Critical
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 604800
                to: 0
              datasourceUid: afm4rznroj11ce
              model:
                dataset: postgres
                editorMode: code
                format: table
                intervalMs: 1000
                maxDataPoints: 43200
                rawQuery: true
                rawSql: "SELECT\r\n    station_name,\r\n    MAX(defect_rate_pct) AS scrap_rate\r\nFROM public.defect_rate_kpi\r\nWHERE production_day >= NOW() - INTERVAL '7 days'\r\nGROUP BY station_name;"
                refId: A
                sql:
                    columns:
                        - parameters: []
                          type: function
                    groupBy:
                        - property:
                            type: string
                          type: groupBy
                    limit: 50
            - refId: B
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - B
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                reducer: last
                refId: B
                type: reduce
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 5
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: B
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 30s
          annotations:
            description: |-
                The scrap rate has exceeded 5% on at least one station/day in the last 7 days.
                Maximum scrap rate detected: {{$values.B}}%.

                Action required:
                - Review last batch quality
                - Check station calibration
                - Audit operator workflow
            summary: "\U0001F6A8 Scrap rate detected on {{ $labels.station_name }} at current rate {{$values.B}}% (threshold: 5%)"
          isPaused: false
          notification_settings:
            receiver: grafana-default-email
